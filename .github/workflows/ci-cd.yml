name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Backend Testing & Linting
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov black flake8

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Format check with black
      run: black --check . || true

    - name: Run pytest
      run: |
        pytest tests/ -v --tb=short --cov=services --cov=agentic --cov=routes --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  # Frontend Testing & Linting
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint with ESLint
      run: |
        npm install --save-dev eslint eslint-plugin-react || true
        npx eslint src --max-warnings 10 || true

    - name: Build
      run: npm run build

    - name: Check build output
      run: |
        ls -la dist/
        echo "Build successful!"

  # Docker Build (optional)
  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image (backend)
      run: |
        docker build -f backend/Dockerfile -t neurosonix:backend-latest backend/
        echo "Backend Docker image built successfully"

    - name: Build Docker image (frontend)
      run: |
        docker build -f frontend/Dockerfile -t neurosonix:frontend-latest frontend/
        echo "Frontend Docker image built successfully"

  # Deploy to Vercel (Frontend) - Optional
  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: frontend

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to Vercel
      run: |
        cd frontend
        npm install -g vercel
        vercel --prod --token ${{ secrets.VERCEL_TOKEN }} || echo "Skipping Vercel deploy (no token)"

  # Code quality check
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Run security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
      continue-on-error: true

    - name: Check for secrets
      run: |
        pip install detect-secrets
        detect-secrets scan --baseline .github/secrets.baseline || echo "No baseline found"
      continue-on-error: true

    - name: Verify no console.log in production code
      run: |
        ! grep -r "console.log" frontend/src --include="*.tsx" --include="*.ts" | grep -v ".test." || echo "Warning: console.log statements found"
      continue-on-error: true

  # Summary
  summary:
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: always()

    steps:
    - name: CI/CD Pipeline Summary
      run: |
        echo "✅ Backend tests: ${{ needs.backend.result }}"
        echo "✅ Frontend build: ${{ needs.frontend.result }}"
        echo "✅ Docker build: ${{ needs.docker.result }}"
        echo ""
        echo "Pipeline completed!"
